<!-- admin-dashboard.component.html -->
<div class="dashboard-container">
    <!-- Side Navigation -->
    <div class="sidenav">
      <div class="branding">
        <img src="../../../../../public/favicon.ico" alt="eHealth Logo">
        <h3>eHealth Admin</h3>
      </div>
      
      <nav>
        <a routerLink="/admin/dashboard" routerLinkActive="active">
          <i class="fas fa-tachometer-alt"></i> Dashboard
        </a>
        <a routerLink="/admin/users" routerLinkActive="active">
          <i class="fas fa-users"></i> User Management
        </a>
        <a routerLink="/admin/appointments" routerLinkActive="active">
          <i class="fas fa-calendar-check"></i> Appointments
        </a>
        <a routerLink="/admin/payments" routerLinkActive="active">
          <i class="fas fa-money-bill-wave"></i> Payments
        </a>
        <a routerLink="/admin/blogs" routerLinkActive="active">
          <i class="fas fa-blog"></i> Content Moderation
        </a>
        <a routerLink="/admin/settings" routerLinkActive="active">
          <i class="fas fa-cog"></i> System Settings
        </a>
      </nav>
    </div>
  
    <!-- Main Content -->
    <div class="main-content">
      <header class="toolbar">
        <div class="search">
          <input type="text" placeholder="Search...">
          <i class="fas fa-search"></i>
        </div>
        <div class="user-actions">
          <span class="notification-badge">3</span>
          <i class="fas fa-bell"></i>
          <div class="user-profile">
            <img src="../../../../assets/images/admin-avatar.jpg.webp" alt="Admin">
            <span>Admin User</span>
          </div>
        </div>
      </header>
  
      <router-outlet></router-outlet>
    </div>
  </div>
